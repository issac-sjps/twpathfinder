<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年百億海外圓夢計畫 - 個人化決策面板</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --info-color: #3498db;
            --purple-color: #8e44ad;
            --bg-color: #f8f9fa;
            --border-color: #dee2e6;
            --alert-bg: #fdf2e9;
            --alert-border: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        h1 { margin: 0; color: var(--primary-color); font-size: 24px; }

        .control-panel {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px 15px;
            width: 280px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background-color 0.2s, opacity 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-toggle { background-color: var(--warning-color); color: white; }
        .btn-toggle:hover { background-color: #d68910; }
        .btn-reset { background-color: var(--secondary-color); color: white; }
        .btn-reset:hover { background-color: #1a252f; }
        .btn-official { background-color: var(--info-color); color: white; }
        .btn-official:hover { background-color: #2980b9; }
        
        .btn-hide { background-color: var(--accent-color); color: white; padding: 5px 10px; font-size: 12px;}
        .btn-hide:hover { background-color: #c0392b; }
        .btn-unhide { background-color: var(--purple-color); color: white; padding: 5px 10px; font-size: 12px;}
        .btn-unhide:hover { background-color: #732d91; }

        .btn-download { background-color: var(--success-color); color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; text-decoration: none; display: inline-block;}
        .btn-download:hover { background-color: #219653; }
        .btn-download.disabled { background-color: #95a5a6; cursor: not-allowed; pointer-events: none; }

        .stats-badge {
            background-color: #e9ecef;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 14px;
            color: #495057;
        }

        /* 異常偵測面板樣式 */
        .missing-alert {
            background-color: var(--alert-bg);
            border-left: 5px solid var(--alert-border);
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 4px;
            display: none; /* 預設隱藏，由程式邏輯判斷是否顯示 */
        }
        
        .missing-alert h3 {
            margin: 0 0 10px 0;
            color: #d35400;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .missing-tag {
            display: inline-block;
            background-color: #fad7a1;
            color: #b93b00;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 6px 6px 0;
            font-weight: bold;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #f39c12;
        }

        .mode-indicator {
            display: none;
            background-color: var(--warning-color);
            color: white;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); vertical-align: top; }
        th { background-color: var(--primary-color); color: white; position: sticky; top: 0; z-index: 10; }
        tr:hover { background-color: #f8f9fa; }
        
        .tag { display: inline-block; padding: 3px 8px; border-radius: 3px; background-color: #e3f2fd; color: #1976d2; font-size: 11px; margin-bottom: 5px; margin-right: 5px; }
        .description-cell { max-width: 350px; }
        .fade-out { opacity: 0; transform: translateX(20px); transition: opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>海外圓夢計畫決策面板</h1>
        <div class="control-panel">
            <span class="stats-badge">顯示：<span id="displayCount">0</span> / 總計：<span id="totalCount">0</span></span>
            <input type="text" id="searchInput" placeholder="輸入關鍵字 (例如: 澳洲, 教學)...">
            <button class="btn btn-toggle" id="toggleHiddenBtn">檢視隱藏計畫</button>
            <button class="btn btn-reset" id="resetHiddenBtn">清空隱藏名單</button>
            <a href="https://twpathfinder.org/overview1830" target="_blank" class="btn btn-official">官方網站找尋</a>
        </div>
    </div>
    
    <div id="missingAlert" class="missing-alert">
        <h3>⚠️ 數據探勘異常報告：官方系統跳號 / 已隱藏之計畫編號</h3>
        <div id="missingIdsList"></div>
    </div>

    <div id="modeIndicator" class="mode-indicator">⚠️ 目前處於「隱藏名單」檢視模式。此處顯示的皆為您已剔除的計畫。</div>

    <table>
        <thead>
            <tr>
                <th style="width: 8%">編號</th>
                <th style="width: 15%">計畫名稱</th>
                <th style="width: 10%">城市</th>
                <th style="width: 17%">主題與類別</th>
                <th style="width: 5%">名額</th>
                <th style="width: 30%">簡述</th>
                <th style="width: 7%">簡章</th>
                <th style="width: 8%">操作</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    let rawData = [];
    let hiddenIds = new Set();
    let isViewingHidden = false; 

    const loadHiddenIds = () => {
        const saved = localStorage.getItem('pathfinder_hidden_ids');
        if (saved) hiddenIds = new Set(JSON.parse(saved));
    };

    const saveHiddenIds = () => {
        localStorage.setItem('pathfinder_hidden_ids', JSON.stringify(Array.from(hiddenIds)));
    };

    // 異常偵測演算法核心
    const detectMissingIds = (data) => {
        const groups = {};
        
        data.forEach(item => {
            const parts = item.id.split('-');
            if (parts.length >= 3) {
                // 擷取前綴 (例如: K-10, I-8)
                const prefix = parts.slice(0, parts.length - 1).join('-');
                // 擷取最後的流水號數字
                const num = parseInt(parts[parts.length - 1], 10);
                
                if (!groups[prefix]) groups[prefix] = [];
                groups[prefix].push(num);
            }
        });

        const missingIds = [];
        
        for (const [prefix, numbers] of Object.entries(groups)) {
            const max = Math.max(...numbers);
            // 掃描 1 到該群組最大值之間所有缺失的數字
            for (let i = 1; i <= max; i++) {
                if (!numbers.includes(i)) {
                    missingIds.push(`${prefix}-${i}`);
                }
            }
        }

        // 渲染至 UI (User Interface) 面板
        if (missingIds.length > 0) {
            const alertBox = document.getElementById('missingAlert');
            const listContainer = document.getElementById('missingIdsList');
            alertBox.style.display = 'block';
            
            missingIds.forEach(id => {
                const span = document.createElement('span');
                span.className = 'missing-tag';
                span.innerText = id;
                listContainer.appendChild(span);
            });
        }
    };

    fetch('pathfinder_data.json')
        .then(res => {
            if (!res.ok) throw new Error("無法讀取 JSON 檔案，請確認伺服器狀態與檔案路徑。");
            return res.json();
        })
        .then(data => {
            rawData = data;
            document.getElementById('totalCount').innerText = rawData.length;
            loadHiddenIds();
            detectMissingIds(rawData); // 啟動斷層掃描
            renderTable();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">資料載入失敗：${err.message}</td></tr>`;
        });

    const renderTable = (searchKeyword = '') => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let displayCount = 0;
        const keyword = searchKeyword.toLowerCase();

        rawData.forEach(item => {
            const isHidden = hiddenIds.has(item.id);
            if (!isViewingHidden && isHidden) return; 
            if (isViewingHidden && !isHidden) return; 

            const searchableText = `${item.project_name} ${item.city} ${item.theme} ${item.description}`.toLowerCase();
            if (keyword && !searchableText.includes(keyword)) return;

            displayCount++;

            const tr = document.createElement('tr');
            tr.id = `row-${item.id}`;
            
            const downloadHtml = item.download_url 
                ? `<a href="${item.download_url}" target="_blank" class="btn-download">下載</a>` 
                : `<span class="btn-download disabled">無</span>`;

            const cleanCategory = item.category.replace(/　/g, '').replace(/\s+/g, ' ');
            
            const actionBtnHtml = isViewingHidden
                ? `<button class="btn btn-unhide" onclick="unhideRow('${item.id}')">取消隱藏</button>`
                : `<button class="btn btn-hide" onclick="hideRow('${item.id}')">隱藏</button>`;

            tr.innerHTML = `
                <td><strong>${item.id}</strong></td>
                <td><strong>${item.project_name}</strong><br><small style="color:#7f8c8d">${item.duration}</small></td>
                <td>${item.city}</td>
                <td>
                    <span class="tag">${cleanCategory}</span><br>
                    <span class="tag" style="background-color:#e8f8f5; color:#1abc9c;">${item.theme}</span>
                </td>
                <td style="text-align:center;">${item.quota}</td>
                <td class="description-cell">${item.description}</td>
                <td>${downloadHtml}</td>
                <td>${actionBtnHtml}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('displayCount').innerText = displayCount;
    };

    window.hideRow = (id) => {
        const row = document.getElementById(`row-${id}`);
        row.classList.add('fade-out');
        hiddenIds.add(id);
        saveHiddenIds();
        setTimeout(() => { renderTable(document.getElementById('searchInput').value); }, 300);
    };

    window.unhideRow = (id) => {
        const row = document.getElementById(`row-${id}`);
        row.classList.add('fade-out'); 
        hiddenIds.delete(id);
        saveHiddenIds();
        setTimeout(() => { renderTable(document.getElementById('searchInput').value); }, 300);
    };

    document.getElementById('toggleHiddenBtn').addEventListener('click', () => {
        isViewingHidden = !isViewingHidden;
        const btn = document.getElementById('toggleHiddenBtn');
        const indicator = document.getElementById('modeIndicator');
        
        if (isViewingHidden) {
            btn.innerText = "返回一般檢視";
            btn.style.backgroundColor = "var(--accent-color)";
            indicator.style.display = "block";
        } else {
            btn.innerText = "檢視隱藏計畫";
            btn.style.backgroundColor = "var(--warning-color)";
            indicator.style.display = "none";
        }
        renderTable(document.getElementById('searchInput').value);
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderTable(e.target.value);
    });

    document.getElementById('resetHiddenBtn').addEventListener('click', () => {
        if(confirm("這將會清除您所有的隱藏紀錄，確定執行？")) {
            hiddenIds.clear();
            saveHiddenIds();
            renderTable(document.getElementById('searchInput').value);
        }
    });
</script>

</body>
</html>
