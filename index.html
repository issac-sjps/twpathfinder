<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年百億海外圓夢計畫 客製化一覽網</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .stats-table th, .stats-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .stats-table th {
            background-color: #f8f9fa;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            display: block;
            padding: 15px 25px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-junior {
            background-color: #3498db;
        }
        .btn-junior:hover {
            background-color: #2980b9;
        }
        .btn-senior {
            background-color: #e67e22;
        }
        .btn-senior:hover {
            background-color: #d35400;
        }
        .note {
            font-size: 0.9em;
            color: #666;
            margin-top: 20px;
            border-left: 4px solid #e74c3c;
            padding-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>青年百億海外圓夢計畫 客製化一覽網</h1>

    <table class="stats-table">
        <thead>
            <tr>
                <th>年齡對象</th>
                <th>計畫總數</th>
                <th>重點備註</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>15 - 未滿 18 歲</td>
                <td>81 案</td>
                <td>含圓夢助力方案 29 案</td>
            </tr>
            <tr>
                <td>18 - 30 歲</td>
                <td>155 案</td>
                <td>含年度旗艦計畫 18 筆 (當前擷取：154 案)</td>
            </tr>
        </tbody>
    </table>

    <div class="button-group">
        <a href="https://issac-sjps.github.io/twpathfinder/1517" class="btn btn-junior">
            進入 15-18 歲報名系統 (15-18 Years Old Registration)
        </a>
        <a href="https://issac-sjps.github.io/twpathfinder/1830" class="btn btn-senior">
            進入 18-30 歲報名系統 (18-30 Years Old Registration)
        </a>
    </div>

    <div class="note">
        <p><strong>數據警示：</strong> 18-30 歲組別原始資料為 155 案，目前系統實際抓取數量為 154 案，請使用者留意 1 案之誤差。</p>
    </div>
</div>

</body>
</html>
